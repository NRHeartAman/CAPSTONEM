{% extends "base.html" %}
{% load static %}

{% block title %}System Settings{% endblock %}

{% block content %}
<style>
:root {
    --brand-black: #000;
    --cream-bg: #fafafa;
    --border: #eee;
}

.settings-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.settings-card {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 4px solid var(--brand-black);
    padding: 25px;
}

.settings-card h3 {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.form-group { margin-bottom: 15px; }

.form-group label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: #888;
    margin-bottom: 6px;
    text-transform: uppercase;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 0;
    font-size: 13px;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #000;
}

.btn-save {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    background: #000;
    color: #fff;
    border: 2px solid #000;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 11px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-save:hover { background: #fff; color: #000; }

.full-width { grid-column: span 2; }

.page-header h1 { font-size: 28px; font-weight: 900; }
.page-header p { font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

/* ALERT BOXES */
.alert {
    padding: 15px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    margin-top: 15px;
    border-radius: 0;
}
.alert.success { background: #000; color: #fff; border-left: 5px solid #4CAF50; }
.alert.error { background: #ff4d4d; color: #fff; border-left: 5px solid #b30000; }

@media(max-width: 768px) {
    .settings-container { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
}
</style>

<!-- HEADER -->
<div class="page-header">
    <h1>System Configuration</h1>
    <p>Internal Parameters & Security</p>
</div>

<!-- DJANGO MESSAGES (Success/Error Alerts) -->

<!-- FORM LAYOUT -->
<form method="POST" class="settings-container">
    {% csrf_token %}

    <!-- STORE PROFILE -->
    <div class="settings-card">
        <h3><i class="bx bx-store-alt"></i> Store Profile</h3>

        <div class="form-group">
            <label>Store Name</label>
            <input type="text" name="store_name" value="{{ config.store_name }}">
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" name="contact_number" value="{{ config.contact_number }}">
        </div>

        <div class="form-group">
            <label>Currency</label>
            <input type="text" value="Philippine Peso (PHP)" disabled style="background:#f9f9f9; color:#aaa;">
        </div>
        <div class="form-group">
            <label>Store Latitude</label>
            <input type="number" step="0.0001" name="store_lat" value="{{ config.store_lat }}">
        </div>

        <div class="form-group">
            <label>Store Longitude</label>
            <input type="number" step="0.0001" name="store_lon" value="{{ config.store_lon }}">
        </div>
        <button type="submit" name="update_config" class="btn-save">
            Update Profile & Engine
        </button>
    </div>

    <!-- FORECAST ENGINE -->
    <div class="settings-card">
        <h3><i class="bx bx-slider-alt"></i> Forecast Engine</h3>

        <div class="form-group">
            <label>Stock Threshold (Low Stock Limit)</label>
            <input type="number" name="stock_threshold" value="{{ config.stock_threshold }}">
        </div>

        <div class="form-group">
            <label>Weather API Key (OpenWeatherMap)</label>
            <input type="password" name="weather_api_key" value="{{ config.weather_api_key }}">
        </div>

        <div class="form-group">
            <label>Forecast Mode</label>
            <select name="forecast_mode">
                <option value="Standard" {% if config.forecast_mode == 'Standard' %}selected{% endif %}>Standard</option>
                <option value="Aggressive" {% if config.forecast_mode == 'Aggressive' %}selected{% endif %}>Aggressive</option>
                <option value="Conservative" {% if config.forecast_mode == 'Conservative' %}selected{% endif %}>Conservative</option>
            </select>
        </div>
    </div>

    <!-- SECURITY -->
    <div class="settings-card full-width">
        <h3><i class="bx bx-shield-quarter"></i> Security Credentials</h3>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat new password">
            </div>
        </div>

        <div class="form-group" style="margin-top:15px;">
            <label>Current Password (Required to Verify Change)</label>
            <input type="password" name="current_password" style="border:2px solid #000;">
        </div>

        <button type="submit" name="update_password" class="btn-save">
            Change Password
        </button>
    </div>

</form>

{% endblock %}
